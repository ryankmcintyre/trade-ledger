name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Build standalone executable
        run: pyinstaller --clean --noconfirm trade_ledger.spec

      - name: Package build as zip
        run: Compress-Archive -Path dist/trade_ledger/* -DestinationPath dist/trade_ledger.zip
        shell: pwsh

      - name: Create GitHub release and upload executable
        uses: softprops/action-gh-release@v3
        with:
          files: dist/trade_ledger.zip
